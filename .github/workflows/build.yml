- name: 打包成 .app 应用
  run: |
    python -m nuitka \
      --standalone \
      --macos-create-app-bundle \
      --follow-imports \
      --enable-plugin=tk-inter \
      --remove-output \
      --output-dir=build \
      pdf_tool.py
    
    # 给 .app 内的可执行文件加权限
    chmod +x build/pdf_tool.app/Contents/MacOS/pdf_tool
    
    echo "✅ .app 应用打包完成"
