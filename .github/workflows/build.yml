name: macOS PDF工具打包 (arm64)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # M1 原生 runner
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install PyPDF2 nuitka
      
      - name: 打包
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --follow-imports \
            --output-dir=build \
            pdf_tool.py
      
      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: PDF工具-macOS-arm64
          path: build/
